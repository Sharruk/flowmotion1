{% extends 'base.html' %}

{% block content %}
<div class="widget-container">
    <div class="widget-card">
        <div class="widget-header">
            <span class="emotional-status">{{ emotional_status }}</span>
            <h3>Next Habit</h3>
        </div>
        
        {% if next_habit %}
        <div class="widget-body">
            <h4 id="habit-name">{{ next_habit.name }}</h4>
            <p id="habit-question">{{ next_habit.question }}</p>
            
            <div class="circular-countdown">
                <svg viewBox="0 0 100 100">
                    <circle class="bg" cx="50" cy="50" r="45"></circle>
                    <circle class="progress" cx="50" cy="50" r="45" id="progress-circle"></circle>
                </svg>
                <div class="countdown-text">
                    <span id="time-value">--</span>
                    <span id="time-label">Units</span>
                </div>
            </div>
            
            <div class="countdown-timer-legacy" id="countdown" 
                 data-time="{{ next_habit.reminder_time|time:'H:i' }}"
                 data-date="{{ next_habit.target_date|date:'Y-m-d' }}"
                 data-recurrence="{{ next_habit.recurrence }}"
                 data-days='{{ next_habit.selected_days|safe }}'
                 style="display:none;">
            </div>
            
            <div class="widget-actions">
                <a href="{% url 'habit_detail' next_habit.id %}" class="btn btn-primary">Complete</a>
                <a href="{% url 'snooze_habit' next_habit.id %}" class="btn btn-secondary">Snooze</a>
            </div>
        </div>
        {% else %}
        <div class="widget-body">
            <p>No upcoming habits. Great job! 😄</p>
        </div>
        {% endif %}
        
        <div class="widget-footer">
            <p class="feedback">{{ feedback_message }}</p>
        </div>
    </div>
</div>

<style>
.widget-container {
    display: flex;
    justify-content: center;
    padding: 20px;
}
.widget-card {
    background: #f8f9fa;
    border: 1px solid #dee2e6;
    border-radius: 12px;
    width: 300px;
    padding: 20px;
    box-shadow: 0 4px 6px rgba(0,0,0,0.1);
}
.widget-header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 15px;
}
.emotional-status {
    font-size: 24px;
}
.circular-countdown {
    position: relative;
    width: 150px;
    height: 150px;
    margin: 20px auto;
}
.circular-countdown svg {
    transform: rotate(-90deg);
}
.circular-countdown circle {
    fill: none;
    stroke-width: 8;
}
.circular-countdown circle.bg {
    stroke: #eee;
}
.circular-countdown circle.progress {
    stroke: #6366f1;
    stroke-dasharray: 283;
    stroke-dashoffset: 0;
    transition: stroke-dashoffset 0.5s ease;
}
.countdown-text {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    text-align: center;
}
#time-value {
    display: block;
    font-size: 28px;
    font-weight: bold;
}
#time-label {
    font-size: 14px;
    color: #666;
}
.widget-actions {
    display: flex;
    gap: 10px;
    justify-content: center;
}
.widget-footer {
    margin-top: 20px;
    text-align: center;
    font-style: italic;
    font-size: 0.9em;
}
</style>

<script>
function updateCountdown() {
    const timerElement = document.getElementById('countdown');
    if (!timerElement) return;
    
    const targetTimeStr = timerElement.getAttribute('data-time');
    const targetDateStr = timerElement.getAttribute('data-date');
    const recurrence = timerElement.getAttribute('data-recurrence');
    const selectedDays = JSON.parse(timerElement.getAttribute('data-days') || '[]');
    
    const now = new Date();
    let target = new Date();
    
    if (targetDateStr) {
        target = new Date(targetDateStr + 'T' + targetTimeStr);
    } else {
        const [hours, minutes] = targetTimeStr.split(':');
        target.setHours(parseInt(hours), parseInt(minutes), 0, 0);
    }
    
    // Recurrence logic
    if (target < now) {
        if (recurrence === 'daily') {
            target.setDate(target.getDate() + 1);
        } else if (recurrence === 'weekly') {
            target.setDate(target.getDate() + 7);
        }
    }
    
    // Filter by selected days if weekly or daily with day filter
    if (selectedDays.length > 0) {
        const daysMap = { 'Sun': 0, 'Mon': 1, 'Tue': 2, 'Wed': 3, 'Thu': 4, 'Fri': 5, 'Sat': 6 };
        const targetDays = selectedDays.map(d => daysMap[d]);
        while (!targetDays.includes(target.getDay())) {
            target.setDate(target.getDate() + 1);
        }
    }
    
    const diff = target - now;
    
    // Circular progress calculation (example: 24h max or distance to start)
    const circle = document.getElementById('progress-circle');
    const maxOffset = 283;
    let percentage = 0;
    
    const timeValue = document.getElementById('time-value');
    const timeLabel = document.getElementById('time-label');
    
    if (diff > 0) {
        const days = Math.floor(diff / (1000 * 60 * 60 * 24));
        const hours = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
        const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
        
        if (days > 0) {
            timeValue.innerText = days;
            timeLabel.innerText = days === 1 ? 'Day' : 'Days';
            percentage = (days % 30) / 30; // Scale 30 days
        } else if (hours > 0) {
            timeValue.innerText = hours;
            timeLabel.innerText = hours === 1 ? 'Hour' : 'Hours';
            percentage = hours / 24;
        } else {
            timeValue.innerText = minutes;
            timeLabel.innerText = minutes === 1 ? 'Min' : 'Mins';
            percentage = minutes / 60;
        }
        
        circle.style.strokeDashoffset = maxOffset * (1 - percentage);
    } else {
        timeValue.innerText = '0';
        timeLabel.innerText = 'Due';
        circle.style.strokeDashoffset = maxOffset;
    }
}

setInterval(updateCountdown, 1000);
updateCountdown();
</script>
{% endblock %}
